name: Notify public Github activity on Slack

on:
  issues:
    types: [opened, reopened, labeled, closed]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]
    branches:
      - main

jobs:
  notify_new_issue:
    if: >-
      github.event_name == 'issues'
      && (github.event.action == 'opened' || github.event.action == 'reopened')
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.issue.author_association)
    name: Notify Slack - New Issue
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: .github/actions/slack-notify-public-github
    - uses: ./.github/actions/slack-notify-public-github
      with:
        emoji: ":ladybug:"
        message: "New issue created"
        github-user-content-title: ${{ github.event.issue.title }}
        github-user-content-url: ${{ github.event.issue.html_url }}
        channel: ${{ secrets.SLACK_CHANNEL_ID }}
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}

  notify_new_issue_comment:
    if: >-
      github.event_name == 'issue_comment'
      && !github.event.issue.pull_request
      && github.event.action == 'created'
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association)
    name: Notify Slack - New Issue Comment
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: .github/actions/slack-notify-public-github
    - uses: ./.github/actions/slack-notify-public-github
      with:
        emoji: ":ladybug:"
        message: "New issue comment"
        github-user-content-title: ${{ github.event.issue.title }}
        github-user-content-url: ${{ github.event.issue.html_url }}
        channel: ${{ secrets.SLACK_CHANNEL_ID }}
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}

  notify_stale_issues:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'stale'
      && github.actor == 'qaihm-bot'
    name: Notify Slack - Issue became Stale
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: .github/actions/slack-notify-public-github
    - uses: ./.github/actions/slack-notify-public-github
      with:
        emoji: ":ladybug:"
        message: "An issue became stale"
        github-user-content-title: ${{ github.event.issue.title }}
        github-user-content-url: ${{ github.event.issue.html_url }}
        channel: ${{ secrets.SLACK_CHANNEL_ID }}
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}

  notify_new_pr:
    if: >-
      github.event_name == 'pull_request_target'
      && (github.event.action == 'opened' || github.event.action == 'reopened')
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
    name: Notify Slack - New PR Created
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: .github/actions/slack-notify-public-github
    - uses: ./.github/actions/slack-notify-public-github
      with:
        emoji: ":male-technologist:"
        message: "New PR"
        github-user-content-title: ${{ github.event.pull_request.title }}
        github-user-content-url: ${{ github.event.pull_request.html_url }}
        channel: ${{ secrets.SLACK_CHANNEL_ID }}
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}

  notify_new_pr_comment:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && github.event.action == 'created'
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association)
    name: Notify Slack - New PR Comment
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: .github/actions/slack-notify-public-github
    - uses: ./.github/actions/slack-notify-public-github
      with:
        emoji: ":male-technologist:"
        message: "New PR Comment"
        github-user-content-title: ${{ github.event.issue.title }}
        github-user-content-url: ${{ github.event.issue.pull_request.html_url }}
        channel: ${{ secrets.SLACK_CHANNEL_ID }}
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
