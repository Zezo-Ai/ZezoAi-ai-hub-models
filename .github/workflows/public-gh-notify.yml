name: Notify public Github activity on Slack

on:
  issues:
    types: [opened, reopened, labeled, closed]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]
    branches:
      - main

env:
  ISSUE_EMOJI: ":ladybug:"
  PR_EMOJI: ":male-technologist:"
  MSG_TITLE: "[Public GitHub]"
  # Escape &, <, > in user-supplied text for Slack mrkdwn.
  # Without this, a crafted title could inject links or @mentions.
  SLACK_ESCAPE: 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
  CHANNEL: ${{ secrets.SLACK_CHANNEL_ID }}

jobs:
  notify_new_issue:
    if: >-
      github.event_name == 'issues'
      && (github.event.action == 'opened' || github.event.action == 'reopened')
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.issue.author_association)
    name: Notify Slack - New Issue
    runs-on: ubuntu-latest
    steps:
    - name: Build payload
      env:
        RAW_TITLE: ${{ github.event.issue.title }}
        URL: ${{ github.event.issue.html_url }}
        LABEL: "New issue created"
      run: |
        slack_title=$(printf '%s' "$RAW_TITLE" | sed "$SLACK_ESCAPE")
        jq -n --arg channel "$CHANNEL" \
              --arg text "$ISSUE_EMOJI $MSG_TITLE $LABEL: <$URL|$slack_title>" \
              '{channel: $channel, text: $text}' > /tmp/slack_api_payload.json
    - uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
        payload-file-path: /tmp/slack_api_payload.json

  notify_new_issue_comment:
    if: >-
      github.event_name == 'issue_comment'
      && !github.event.issue.pull_request
      && github.event.action == 'created'
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association)
    name: Notify Slack - New Issue Comment
    runs-on: ubuntu-latest
    steps:
    - name: Build payload
      env:
        RAW_TITLE: ${{ github.event.issue.title }}
        URL: ${{ github.event.issue.html_url }}
        LABEL: "New issue comment"
      run: |
        slack_title=$(printf '%s' "$RAW_TITLE" | sed "$SLACK_ESCAPE")
        jq -n --arg channel "$CHANNEL" \
              --arg text "$ISSUE_EMOJI $MSG_TITLE $LABEL: <$URL|$slack_title>" \
              '{channel: $channel, text: $text}' > /tmp/slack_api_payload.json
    - uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
        payload-file-path: /tmp/slack_api_payload.json

  notify_stale_issues:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'stale'
      && github.actor == 'qaihm-bot'
    name: Notify Slack - Issue became Stale
    runs-on: ubuntu-latest
    steps:
    - name: Build payload
      env:
        RAW_TITLE: ${{ github.event.issue.title }}
        URL: ${{ github.event.issue.html_url }}
        LABEL: "An issue became stale"
      run: |
        slack_title=$(printf '%s' "$RAW_TITLE" | sed "$SLACK_ESCAPE")
        jq -n --arg channel "$CHANNEL" \
              --arg text "$ISSUE_EMOJI $MSG_TITLE $LABEL: <$URL|$slack_title>" \
              '{channel: $channel, text: $text}' > /tmp/slack_api_payload.json
    - uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
        payload-file-path: /tmp/slack_api_payload.json

  notify_new_pr:
    if: >-
      github.event_name == 'pull_request_target'
      && (github.event.action == 'opened' || github.event.action == 'reopened')
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
    name: Notify Slack - New PR Created
    runs-on: ubuntu-latest
    steps:
    - name: Build payload
      env:
        RAW_TITLE: ${{ github.event.pull_request.title }}
        URL: ${{ github.event.pull_request.html_url }}
        LABEL: "New PR"
      run: |
        slack_title=$(printf '%s' "$RAW_TITLE" | sed "$SLACK_ESCAPE")
        jq -n --arg channel "$CHANNEL" \
              --arg text "$PR_EMOJI $MSG_TITLE $LABEL: <$URL|$slack_title>" \
              '{channel: $channel, text: $text}' > /tmp/slack_api_payload.json
    - uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
        payload-file-path: /tmp/slack_api_payload.json

  notify_new_pr_comment:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && github.event.action == 'created'
      && !contains(fromJSON('["MEMBER", "OWNER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.comment.author_association)
    name: Notify Slack - New PR Comment
    runs-on: ubuntu-latest
    steps:
    - name: Build payload
      env:
        RAW_TITLE: ${{ github.event.issue.title }}
        URL: ${{ github.event.issue.pull_request.html_url }}
        LABEL: "New PR Comment"
      run: |
        slack_title=$(printf '%s' "$RAW_TITLE" | sed "$SLACK_ESCAPE")
        jq -n --arg channel "$CHANNEL" \
              --arg text "$PR_EMOJI $MSG_TITLE $LABEL: <$URL|$slack_title>" \
              '{channel: $channel, text: $text}' > /tmp/slack_api_payload.json
    - uses: slackapi/slack-github-action@v3
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
        payload-file-path: /tmp/slack_api_payload.json
