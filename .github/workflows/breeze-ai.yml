name: Breeze-AI Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
jobs:
  trigger-breeze-ai:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@breeze-ai')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@breeze-ai')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@breeze-ai')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@breeze-ai') || contains(github.event.issue.title, '@breeze-ai')))
    uses: qcom-eng-Nimbus/custom-templates/.github/workflows/breeze-ai.yaml@main
    secrets: inherit
