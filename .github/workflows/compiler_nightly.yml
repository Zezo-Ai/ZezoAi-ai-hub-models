##
## Compiler Nightly Scorecard
##
## Runs nightly to clone and execute compiler scorecard tests from prod to dev
##

name: Compiler Nightly Scorecard

on:
  # Run daily at 1am PST (9am UTC)
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      aihm_tag:
        description: 'Git tag of AIHM (e.g., v0.48.0). If not provided, uses latest tag.'
        required: false
        type: string
      dry_run:
        description: 'Process only first 10 models for testing'
        required: false
        type: boolean
        default: false
      delay:
        description: 'Wait time before collecting results'
        required: true
        default: compiler_nightly_2h_delay
        type: choice
        options:
          - compiler_nightly_2h_delay
          - compiler_nightly_immediate
      always_upload:
        description: 'Always upload models from prod (skip checking for existing models in dev)'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.10"
  VENV_PATH: build/ci-envs/qaihm-build
  COMPILER_NIGHTLY_PROJECT_ID: ${{ secrets.COMPILER_NIGHTLY_PROJECT_ID }}

jobs:
  wait_workbench_deployment:
    name: "Wait For Workbench to Finish Deploying"
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}
          bnt-venv-install-cmd: install_compiler_nightly
          hub-deployments: dev
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}

      - name: Wait for workbench
        uses: ./.github/actions/wait-workbench-deployment
        with:
          venv-path: ${{ env.VENV_PATH }}

  submit_compile_jobs:
    name: "Submit Compile Jobs"
    needs: wait_workbench_deployment
    runs-on: [tetra-ubuntu-2204, self-hosted]
    permissions:
      contents: read
      id-token: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all tags

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}
          bnt-venv-install-cmd: install_compiler_nightly
          hub-deployments: prod,dev
          hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}

      - name: Checkout scorecard intermediates
        id: checkout_intermediates
        working-directory: scripts/compiler_nightly
        env:
          AIHM_TAG: ${{ inputs.aihm_tag }}
        run: |
          bash clone_aihm_intermediates.sh "$AIHM_TAG"

          # Find the created directory
          INTERMEDIATES_DIR=$(ls -d intermediates_* | head -1)
          echo "intermediates_dir=${INTERMEDIATES_DIR}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Clone scorecard
        working-directory: scripts/compiler_nightly
        env:
          INTERMEDIATES_DIR: ${{ steps.checkout_intermediates.outputs.intermediates_dir }}
          DRY_RUN: ${{ inputs.dry_run }}
          ALWAYS_UPLOAD: ${{ inputs.always_upload }}
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          DRY_ARG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_ARG="--dry-run"
          fi

          ALWAYS_UPLOAD_ARG=""
          if [ "$ALWAYS_UPLOAD" = "true" ]; then
            ALWAYS_UPLOAD_ARG="--always-upload"
          fi

          python clone_scorecard.py \
            --prod-profile prod \
            --dev-profile dev \
            --intermediates-dir "${INTERMEDIATES_DIR}" \
            --output-dir results \
            $DRY_ARG \
            $ALWAYS_UPLOAD_ARG \
            --verbose
        shell: bash

      - name: Submit compile jobs
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          # Find the most recent dev-compile-scorecard file
          CONFIG_FILE=$(ls -t results/dev-compile-scorecard__*.yaml | head -1)

          python run_compile_jobs.py \
            --dev-profile dev \
            --config "${CONFIG_FILE}" \
            --output-dir results \
            --verbose
        shell: bash

      - name: Upload job submission results
        uses: actions/upload-artifact@v7
        with:
          name: compiler-scorecard-jobs-${{ github.run_number }}
          path: scripts/compiler_nightly/results/
          retention-days: 30

  submit_link_jobs:
    name: "Submit Link Jobs"
    needs: submit_compile_jobs
    runs-on: [tetra-ubuntu-2204, self-hosted]
    permissions:
      contents: read
      id-token: write
      issues: write

    environment:
      name: compiler_nightly_90m_delay

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}
          bnt-venv-install-cmd: install_compiler_nightly
          hub-deployments: prod,dev
          hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}

      - name: Download job submission results
        uses: actions/download-artifact@v8
        with:
          name: compiler-scorecard-jobs-${{ github.run_number }}
          path: scripts/compiler_nightly/results/

      - name: Submit link jobs
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          # Find compile jobs and link scorecard
          COMPILE_JOBS=$(ls -t results/dev-compile-jobs__*.yaml | head -1)
          LINK_SCORECARD=$(ls -t results/link-scorecard__*.yaml | head -1)

          python run_link_jobs.py \
            --dev-profile dev \
            --dev-compile-config "${COMPILE_JOBS}" \
            --prod-link-config "${LINK_SCORECARD}" \
            --verbose
        shell: bash

      - name: Upload link job submission results
        uses: actions/upload-artifact@v7
        with:
          name: compiler-scorecard-link-jobs-${{ github.run_number }}
          path: scripts/compiler_nightly/results/dev-link-jobs__*.yaml
          retention-days: 30

  collect_link_results:
    name: "Collect Link Results"
    needs: submit_link_jobs
    runs-on: [tetra-ubuntu-2204, self-hosted]
    permissions:
      contents: read
      id-token: write
      issues: write

    environment:
      name: compiler_nightly_3h_delay

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}
          bnt-venv-install-cmd: install_compiler_nightly
          hub-deployments: dev
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}

      - name: Download link job submission results
        uses: actions/download-artifact@v8
        with:
          name: compiler-scorecard-link-jobs-${{ github.run_number }}
          path: scripts/compiler_nightly/results/

      - name: Collect link results
        if: always()
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          JOBS_FILE=$(ls -t results/dev-link-jobs__*.yaml | head -1)

          python collect_link_results.py \
            --dev-profile dev \
            --dev-link-config "${JOBS_FILE}" \
            --verbose
        shell: bash

      - name: Print link results summary
        if: always()
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          DEV_LINK_CONFIG=$(ls -t results/dev-link-jobs__*.yaml | head -1)
          PROD_LINK_CONFIG=$(ls -t results/link-scorecard__*.yaml | head -1)

          python post_link_results.py \
            --dev-link-config "${DEV_LINK_CONFIG}" \
            --prod-link-config "${PROD_LINK_CONFIG}" \
            --verbose
        shell: bash

      - name: Upload link results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compiler-scorecard-link-results-${{ github.run_number }}
          path: scripts/compiler_nightly/results/
          retention-days: 30

  collect_compile_results:
    name: "Collect Compile Results"
    needs: submit_compile_jobs
    runs-on: [tetra-ubuntu-2204, self-hosted]
    permissions:
      contents: read
      id-token: write
      issues: write

    environment:
      name: ${{ inputs.delay == 'compiler_nightly_immediate' && 'compiler_nightly_immediate' || 'compiler_nightly_2h_delay' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all tags

      - name: CI Setup
        uses: ./.github/actions/ci-setup
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          venv-path: ${{ env.VENV_PATH }}
          bnt-venv-install-cmd: install_compiler_nightly
          hub-deployments: dev
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}

      - name: Download job submission results
        uses: actions/download-artifact@v8
        with:
          name: compiler-scorecard-jobs-${{ github.run_number }}
          path: scripts/compiler_nightly/results/

      - name: Collect compile results
        if: always()
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          # Find the most recent jobs file
          JOBS_FILE=$(ls -t results/dev-compile-jobs__*.yaml | head -1)

          python collect_compile_results.py \
            --dev-profile dev \
            --jobs-file "${JOBS_FILE}" \
            --verbose
        shell: bash

      - name: Print results summary
        if: always()
        working-directory: scripts/compiler_nightly
        run: |
          source "${{ github.workspace }}/${{ env.VENV_PATH }}/bin/activate"

          python post_compile_results.py \
            --results-dir results \
            --verbose
        shell: bash

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compiler-scorecard-results-${{ github.run_number }}
          path: scripts/compiler_nightly/results/
          retention-days: 30
