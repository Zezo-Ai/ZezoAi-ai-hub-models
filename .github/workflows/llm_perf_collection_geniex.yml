## Collects TPS/TTFT via geniex-bench (llama_cpp + qairt plugins) on QDC,
## then opens one PR replaying perf.yaml updates from a JSON-lines updates file.
## Structure mirrors llm_perf_collection.yml (genie) so the two runtimes stay
## parallel: prepare_matrix -> collect_geniex_bench_perf (matrix over QDC pool)
## -> consolidate_pr.

name: GenieX Performance Collection
run-name: "GenieX Perf (${{ inputs.model || 'all' }}, ${{ inputs.device || 'all' }}, ${{ inputs.geniex_version || 'latest' }})"

env:
  VENV_PATH: build/ci-envs/qaihm-build
  QAIHM_CI: 1

on:
  # Allows this workflow to be manually triggered.
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM Model(s) to test. Comma-separated for multiple, or "all" for all LLMs.'
        required: true
        default: 'all'
        type: string

      device:
        description: 'Target device(s). See `src/qai_hub_models/scorecard/device.py`. Comma-separated scorecard device names (e.g. "cs_x2_elite,cs_auto_lemans_8775"), or "all" for all LLM compile devices.'
        required: true
        default: 'all'
        type: string

      geniex_bench_plugin:
        description: 'geniex-bench plugin(s) to run.'
        default: 'all'
        type: choice
        options:
          - all
          - llama_cpp
          - qairt

      precision:
        description: 'Precision(s) to collect perf for. Comma-separated (e.g. "w4,w4a16"), "all" for every supported precision, or "default" to use the model''s default precision.'
        required: true
        default: 'default'
        type: string

      geniex_version:
        description: 'Pin GenieX release tag (e.g. "v0.3.1"). Leave blank for the unversioned "latest stable" mirror.'
        required: false
        default: ''
        type: string

      release_assets_action_id:
        description: 'Run ID with a fresh Scorecard LLM Perf Release Assets (<run_id>) artifact to override the committed copy.'
        type: string
        default: ''

      create_pr:
        description: 'Create PR with perf.yaml changes'
        default: true
        type: boolean

  workflow_call:
    inputs:
      model:
        description: 'LLM Model(s) to test. Comma-separated for multiple, or "all" for all LLMs.'
        type: string
        default: 'all'

      device:
        description: 'Target device(s). See `src/qai_hub_models/scorecard/device.py`. Comma-separated scorecard device names, or "all" for all LLM compile devices.'
        type: string
        default: 'all'

      geniex_bench_plugin:
        description: 'geniex-bench plugin(s) to run.'
        type: string
        default: 'all'

      precision:
        description: 'Precision(s) to collect perf for. Comma-separated, "all", or "default" to use the model''s default precision.'
        type: string
        default: 'default'

      geniex_version:
        description: 'Pin GenieX release tag (e.g. "v0.3.1"). Leave blank for the unversioned "latest stable" mirror.'
        type: string
        default: ''

      release_assets_action_id:
        description: 'Run ID with a fresh Scorecard LLM Perf Release Assets (<run_id>) artifact to override the committed copy.'
        type: string
        default: ''

      create_pr:
        description: 'Create PR with perf.yaml changes'
        type: boolean
        default: true


defaults:
  run:
    shell: bash

jobs:
  prepare_matrix:
    name: "Split Devices By QDC Pool"
    runs-on: [tetra-ubuntu-2204, self-hosted]
    outputs:
      matrix_include: ${{ steps.split.outputs.matrix_include }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 1
    - id: split
      env:
        DEVICE_INPUT: ${{ inputs.device }}
      run: python3 scripts/ci/split_llm_devices.py

  collect_geniex_bench_perf:
    name: "Collect GenieX-bench Performance (${{ matrix.pool }})"
    needs: prepare_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare_matrix.outputs.matrix_include) }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 2880
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: read
    env:
      QDC_API_TOKEN: ${{ secrets.QDC_API_KEY }}
      QDC_PRIVATE_API_KEY: ${{ secrets.QDC_PRIVATE_API_KEY }}
      JOBS_FILE: ${{ github.workspace }}/src/qai_hub_models/scorecard/intermediates/geniex_jobs_${{ matrix.pool }}_pool.yaml
    outputs:
      results_url: ${{ steps.upload-results.outputs.artifact-url }}
      perf_updates_url: ${{ steps.upload-perf-updates.outputs.artifact-url }}

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: CI Setup
      uses: ./.github/actions/ci-setup
      with:
        python-version: USE_EXISTING_INSTALL
        venv-path: ${{ env.VENV_PATH }}
        aws-role-arn: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}

    - name: Install qai_hub_models from source
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        pip install -e src/

    - name: Download QDC wheel and install
      run: |
        python3 scripts/build_and_test.py \
          --venv="${{ env.VENV_PATH }}" \
          --python="$(which python3)" \
          download_qdc_wheel --only
        source ${{ env.VENV_PATH }}/bin/activate
        pip install qualcomm_device_cloud_sdk-*.whl

    - name: Download Fresh Release Assets
      if: ${{ inputs.release_assets_action_id != '' }}
      uses: actions/download-artifact@v8
      with:
        run-id: ${{ inputs.release_assets_action_id }}
        github-token: ${{ github.token }}
        name: Scorecard LLM Perf Release Assets (${{ inputs.release_assets_action_id }})
        path: ${{ github.workspace }}/llm-release-assets

    - name: Submit geniex-bench Jobs
      id: submit
      env:
        QAIHM_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ matrix.devices }}
        GENIEX_BENCH_PLUGIN: ${{ inputs.geniex_bench_plugin || 'all' }}
        GENIEX_BENCH_PRECISIONS: ${{ inputs.precision || 'default' }}
        GENIEX_VERSION: ${{ inputs.geniex_version || '' }}
        QAIHM_LLM_PERF_RELEASE_ASSETS: ${{ inputs.release_assets_action_id != '' && format('{0}/llm-release-assets/release-assets.yaml', github.workspace) || '' }}
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        cd $GITHUB_WORKSPACE
        extra=()
        if [ -n "$GENIEX_VERSION" ]; then
          extra+=(--geniex-version "$GENIEX_VERSION")
        fi
        python -m qai_hub_models.scripts.run_geniex_bench_benchmarks submit \
          --models "$QAIHM_MODELS" \
          --devices "$QAIHM_TEST_DEVICES" \
          --plugin "$GENIEX_BENCH_PLUGIN" \
          --precisions "$GENIEX_BENCH_PRECISIONS" \
          --jobs-file "$JOBS_FILE" \
          "${extra[@]}"

    - name: Collect geniex-bench Results
      id: run_benchmarks
      continue-on-error: true
      env:
        QAIHM_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ matrix.devices }}
        GENIEX_BENCH_PLUGIN: ${{ inputs.geniex_bench_plugin || 'all' }}
        GENIEX_BENCH_PRECISIONS: ${{ inputs.precision || 'default' }}
        GENIEX_VERSION: ${{ inputs.geniex_version || '' }}
        QAIHM_LLM_PERF_RELEASE_ASSETS: ${{ inputs.release_assets_action_id != '' && format('{0}/llm-release-assets/release-assets.yaml', github.workspace) || '' }}
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        cd $GITHUB_WORKSPACE
        extra=()
        if [ -n "$GENIEX_VERSION" ]; then
          extra+=(--geniex-version "$GENIEX_VERSION")
        fi
        python -m qai_hub_models.scripts.run_geniex_bench_benchmarks collect \
          --models "$QAIHM_MODELS" \
          --devices "$QAIHM_TEST_DEVICES" \
          --plugin "$GENIEX_BENCH_PLUGIN" \
          --precisions "$GENIEX_BENCH_PRECISIONS" \
          --jobs-file "$JOBS_FILE" \
          --perf-updates-json "$GITHUB_WORKSPACE/geniex_perf_updates_${{ matrix.pool }}.jsonl" \
          "${extra[@]}"

    - name: Upload geniex jobs yaml
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: geniex-jobs-${{ matrix.pool }}
        path: ${{ env.JOBS_FILE }}
        if-no-files-found: ignore

    - name: Upload geniex-bench results
      id: upload-results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: geniex-bench-results-${{ matrix.pool }}
        path: |
          ${{ github.workspace }}/geniex_bench_results.csv
          ${{ github.workspace }}/geniex_bench_results/**/*.json

    - name: Upload geniex perf.yaml updates
      id: upload-perf-updates
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: perf-updates-geniex-${{ matrix.pool }}
        path: ${{ github.workspace }}/geniex_perf_updates_${{ matrix.pool }}.jsonl
        if-no-files-found: ignore

    - name: Fail workflow if benchmarks failed
      if: ${{ !cancelled() && steps.run_benchmarks.outcome == 'failure' }}
      run: exit 1

  consolidate_pr:
    name: "Consolidate Perf Updates → PR"
    needs: collect_geniex_bench_perf
    if: ${{ !cancelled() && inputs.create_pr }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 60
    permissions:
      contents: write
      actions: read
      pull-requests: write
    outputs:
      branch_name: ${{ steps.push_changes.outputs.branch_name }}
      has_changes: ${{ steps.check_changes.outputs.has_changes }}
    env:
      QAIHM_CI_USE_EDITABLE_INSTALL: 1
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: CI Setup
      uses: ./.github/actions/ci-setup
      with:
        python-version: USE_EXISTING_INSTALL
        venv-path: ${{ env.VENV_PATH }}

    - name: Install qai_hub_models from source
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        pip install -e src/

    - name: Download perf updates (all legs)
      uses: actions/download-artifact@v8
      with:
        pattern: perf-updates-geniex-*
        merge-multiple: true
        path: ${{ github.workspace }}/llm-perf-updates
        github-token: ${{ github.token }}

    - name: Apply perf updates into perf.yaml files
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        python3 -m qai_hub_models.scripts.apply_llm_perf_updates \
          "$GITHUB_WORKSPACE/llm-perf-updates"

    - name: Check for perf.yaml changes
      id: check_changes
      run: |
        has_modified=$(git diff --quiet src/qai_hub_models/models/*/perf.yaml 2>/dev/null && echo "false" || echo "true")
        has_untracked=$(git ls-files --others --exclude-standard | grep -q 'perf\.yaml$' && echo "true" || echo "false")
        if [ "$has_modified" = "true" ] || [ "$has_untracked" = "true" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No perf.yaml changes detected"
        fi

    - name: Commit & push
      id: push_changes
      if: ${{ steps.check_changes.outputs.has_changes == 'true' }}
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ inputs.device || 'all' }}
      run: |
        branch_name="perf/geniex-perf-${{ github.run_id }}"
        cd $GITHUB_WORKSPACE
        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        git checkout -b "$branch_name"
        git ls-files -co --exclude-standard | grep 'perf.yaml' | xargs git add
        git commit -m "Add GenieX performance numbers

        Models: $QAIHM_TEST_MODELS
        Devices: $QAIHM_TEST_DEVICES

        Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
        git push -u origin "$branch_name"
        echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

    - name: Upload consolidated perf.yaml files
      if: ${{ steps.check_changes.outputs.has_changes == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: updated-perf-yamls
        path: src/qai_hub_models/models/**/perf.yaml

    - name: Create Pull Request
      if: ${{ steps.push_changes.outputs.branch_name != '' && steps.check_changes.outputs.has_changes == 'true' }}
      uses: actions/github-script@v9
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ inputs.device || 'all' }}
      with:
        github-token: ${{ secrets.STAGING_GH_TOKEN }}
        result-encoding: string
        script: |
          const { repo, owner } = context.repo;
          const runId = '${{ github.run_id }}';
          const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
          const models = process.env.QAIHM_TEST_MODELS;
          const devices = process.env.QAIHM_TEST_DEVICES;
          const result = await github.rest.pulls.create({
            title: `[Automated] Add GenieX performance numbers for ${runId} scorecard`,
            owner,
            repo,
            head: '${{ steps.push_changes.outputs.branch_name }}',
            base: 'main',
            body: [
              `Update data for [${runId} scorecard](${runUrl}).`,
              '',
              `Models: ${models}`,
              `Devices: ${devices}`,
              '',
              `Workflow Run: ${runUrl}`,
            ].join('\n')
          });
          console.log('PR created:', result.data.html_url);
          return result.data.html_url;
