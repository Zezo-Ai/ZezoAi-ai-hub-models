# Collects TPS/TTFT for LLM models on QDC. Genie bundles come from each
# model's release-assets.yaml (no compilation here).

name: LLM Performance Collection
run-name: "LLM Perf (${{ inputs.model || 'all' }}, ${{ inputs.device == 'default' && 'cs_8_elite_qrd' || inputs.device || 'all' }})"

env:
  VENV_PATH: build/ci-envs/qaihm-build
  QAIHM_CI: 1
  QAIHM_TEST_DEVICES_RESOLVED: ${{ inputs.device == 'default' && 'cs_8_elite_qrd' || inputs.device || 'all' }}

on:
  # Allows this workflow to be manually triggered.
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM Model(s) to test. Comma-separated for multiple, or "all" for all LLMs.'
        required: true
        default: 'all'
        type: string

      device:
        description: 'Target device(s). See `src/qai_hub_models/scorecard/device.py`. Comma-separated scorecard device names (e.g. "cs_x2_elite,cs_auto_lemans_8775"), or "all" for all LLM compile devices.'
        required: true
        default: 'all'
        type: string

      precision:
        description: 'Precision(s) to collect perf for. Comma-separated (e.g. "w4,w4a16"), "all" for every supported precision, or "default" to use the model''s default_precisions.'
        required: true
        default: 'default'
        type: string

      deployment:
        description: 'Hub Deployment'
        default: prod
        type: choice
        options:
          - prod
          - staging
          - dev

      run_eval:
        description: 'Run on-device evaluation with default prompts. To use custom prompts, run locally via CLI: python -m qai_hub_models.utils.qdc.genie_jobs --eval-prompts <path-to-json>'
        default: true
        type: boolean

      create_pr:
        description: 'Create PR with perf.yaml changes'
        default: true
        type: boolean

      release_assets_action_id:
        description: 'Run ID with a fresh Scorecard LLM Perf Release Assets (<run_id>) artifact to override the committed copy.'
        type: string
        default: ''

  workflow_call:
    inputs:
      model:
        description: 'LLM Model(s) to test. Comma-separated for multiple, or "all" for all LLMs.'
        type: string
        default: 'all'

      device:
        description: 'Target device(s). See `src/qai_hub_models/scorecard/device.py`. Comma-separated scorecard device names, or "all" for all LLM compile devices.'
        type: string
        default: 'all'

      precision:
        description: 'Precision(s) to collect perf for. Comma-separated, "all", or "default" to use the model''s default_precisions.'
        type: string
        default: 'default'

      deployment:
        description: 'Hub Deployment'
        type: string
        default: prod

      run_eval:
        description: 'Run on-device evaluation'
        type: boolean
        default: true

      create_pr:
        description: 'Create PR with perf.yaml changes'
        type: boolean
        default: true

      release_assets_action_id:
        description: 'Run ID with a fresh Scorecard LLM Perf Release Assets (<run_id>) artifact to override the committed copy.'
        type: string
        default: ''


defaults:
  run:
    shell: bash

jobs:
  prepare_matrix:
    name: "Split Devices By QDC Pool"
    runs-on: [tetra-ubuntu-2204, self-hosted]
    outputs:
      matrix_include: ${{ steps.split.outputs.matrix_include }}
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 1
    - id: split
      env:
        DEVICE_INPUT: ${{ inputs.device }}
      run: python3 scripts/ci/split_llm_devices.py

  collect_llm_perf:
    name: "Collect LLM Performance (${{ matrix.pool }})"
    needs: prepare_matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare_matrix.outputs.matrix_include) }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 2880
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: read
    env:
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      QDC_API_TOKEN: ${{ secrets.QDC_API_KEY }}
      QDC_PRIVATE_API_KEY: ${{ secrets.QDC_PRIVATE_API_KEY }}
      QAIHM_JUNIT_XML_PATH: ${{ github.workspace }}/test-results/models-junit.xml
      QAIRT_SDK_PATH: ${{ github.workspace }}/qairt_auto_sdk.zip
      JOBS_FILE: ${{ github.workspace }}/src/qai_hub_models/scorecard/intermediates/genie_jobs_${{ matrix.pool }}_pool.yaml

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 1

    - name: CI Setup
      uses: ./.github/actions/ci-setup
      with:
        python-version: USE_EXISTING_INSTALL
        venv-path: ${{ env.VENV_PATH }}
        bnt-venv-install-cmd: install_global_requirements
        aws-role-arn: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}
        hub-deployments: ${{ inputs.deployment || 'prod' }}
        hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
        hub-user-token-staging: ${{ secrets.HUB_USER_TOKEN_STAGING }}
        hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}
        hub-user-token-sandbox: ${{ secrets.HUB_USER_TOKEN_SANDBOX }}

    - name: Download QDC tools
      env:
        QAIRT_SDK_PATH: ${{ github.workspace }}/qairt_auto_sdk.zip
      run: |
        python3 scripts/build_and_test.py \
          --venv="${{ env.VENV_PATH }}" \
          --python="$(which python3)" \
          download_qdc_wheel --only
        python3 scripts/build_and_test.py \
          --venv="${{ env.VENV_PATH }}" \
          download_qairt_auto_sdk --only

    - name: Install QDC
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        pip install qualcomm_device_cloud_sdk-*.whl

    - name: Download Fresh Release Assets
      if: ${{ inputs.release_assets_action_id != '' }}
      uses: actions/download-artifact@v8
      with:
        run-id: ${{ inputs.release_assets_action_id }}
        github-token: ${{ github.token }}
        name: Scorecard LLM Perf Release Assets (${{ inputs.release_assets_action_id }})
        path: ${{ github.workspace }}/llm-release-assets

    - name: Submit LLM Perf Jobs
      id: submit
      env:
        QAIHM_LLM_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ matrix.devices }}
        QAIHM_LLM_PERF_PRECISIONS: ${{ inputs.precision }}
        QAIHM_RUN_EVAL: ${{ inputs.run_eval }}
        QAIHM_LLM_PERF_RELEASE_ASSETS: ${{ inputs.release_assets_action_id != '' && format('{0}/llm-release-assets/release-assets.yaml', github.workspace) || '' }}
        AWS_ROLE_ARN: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}
        AWS_REGION: us-west-2
        AWS_PROFILE_NAME: qaihm
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        cd $GITHUB_WORKSPACE
        python -m qai_hub_models.models._shared.llm.qdc.genie_jobs submit --jobs-file "$JOBS_FILE"

    - name: Collect LLM Performance Results
      id: run_tests
      continue-on-error: true
      env:
        QAIHM_LLM_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ matrix.devices }}
        QAIHM_LLM_PERF_PRECISIONS: ${{ inputs.precision }}
        QAIHM_RUN_EVAL: ${{ inputs.run_eval }}
        QAIHM_LLM_PERF_UPDATES: ${{ github.workspace }}/genie_perf_updates_${{ matrix.pool }}.jsonl
        AWS_ROLE_ARN: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}
        AWS_REGION: us-west-2
        AWS_PROFILE_NAME: qaihm
      run: |
        source ${{ env.VENV_PATH }}/bin/activate
        cd $GITHUB_WORKSPACE
        mkdir -p "$GITHUB_WORKSPACE/test-results"
        python -m qai_hub_models.models._shared.llm.qdc.genie_jobs collect \
          --jobs-file "$JOBS_FILE" \
          --junit-xml "$GITHUB_WORKSPACE/test-results/models-junit-llm_perf.xml"

    - name: Upload genie jobs yaml
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: genie-jobs-${{ matrix.pool }}
        path: ${{ env.JOBS_FILE }}
        if-no-files-found: ignore

    - name: Upload perf.yaml updates
      id: upload-perf-updates
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: perf-updates-genie-${{ matrix.pool }}
        path: ${{ github.workspace }}/genie_perf_updates_${{ matrix.pool }}.jsonl
        if-no-files-found: ignore

    - name: Generate Test Failure Summary
      if: ${{ !cancelled() }}
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        pip install -q six
        python3 scripts/build_and_test.py --venv="${{ env.VENV_PATH }}" generate_test_summary

    - name: Upload Test Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-results-${{ matrix.pool }}
        path: ${{ github.workspace }}/test-results

    - name: Stage eval results for upload
      if: ${{ !cancelled() }}
      run: |
        mkdir -p "$GITHUB_WORKSPACE/llm-perf-results"
        find "$GITHUB_WORKSPACE" -maxdepth 2 -type f \
          \( -name '*_eval.json' -o -name '*_eval.meta.json' \) \
          -exec cp {} "$GITHUB_WORKSPACE/llm-perf-results/" \;

    - name: Upload eval results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: llm-perf-results-${{ matrix.pool }}
        path: llm-perf-results/
        if-no-files-found: ignore

    - name: Add CSV to GitHub summary
      if: ${{ !cancelled() }}
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        pip install -q pandas tabulate
        python -c 'import os, pandas as pd; print("## On-device Results"); fn="test_perf_on_device.csv"; print(pd.read_csv(fn).to_markdown(index=False)) if os.path.exists(fn) else print(f"File {fn} not found.")' >> "$GITHUB_STEP_SUMMARY"

    - name: Fail workflow if tests failed
      if: ${{ !cancelled() && steps.run_tests.outcome != 'success' }}
      run: exit 1

  consolidate_pr:
    name: "Consolidate Perf Updates → PR"
    needs: collect_llm_perf
    if: ${{ !cancelled() && inputs.create_pr }}
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 60
    permissions:
      contents: write
      actions: read
      pull-requests: write
    env:
      QAIHM_CI_USE_EDITABLE_INSTALL: 1
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: CI Setup
      uses: ./.github/actions/ci-setup
      with:
        python-version: USE_EXISTING_INSTALL
        venv-path: ${{ env.VENV_PATH }}
        hub-deployments: ${{ inputs.deployment || 'prod' }}
        hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
        hub-user-token-staging: ${{ secrets.HUB_USER_TOKEN_STAGING }}
        hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}
        hub-user-token-sandbox: ${{ secrets.HUB_USER_TOKEN_SANDBOX }}

    - name: Download perf updates (all legs)
      uses: actions/download-artifact@v8
      with:
        pattern: perf-updates-genie-*
        merge-multiple: true
        path: ${{ github.workspace }}/llm-perf-updates
        github-token: ${{ github.token }}

    - name: Apply perf updates into perf.yaml files
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        python3 -m qai_hub_models.scripts.apply_llm_perf_updates \
          "$GITHUB_WORKSPACE/llm-perf-updates"

    - name: Check for perf.yaml changes
      id: check_changes
      run: |
        has_modified=$(git diff --quiet src/qai_hub_models/models/*/perf.yaml 2>/dev/null && echo "false" || echo "true")
        has_untracked=$(git ls-files --others --exclude-standard | grep -q 'perf\.yaml$' && echo "true" || echo "false")
        if [ "$has_modified" = "true" ] || [ "$has_untracked" = "true" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No perf.yaml changes detected"
        fi

    - name: Commit & push
      id: push_changes
      if: ${{ steps.check_changes.outputs.has_changes == 'true' }}
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ env.QAIHM_TEST_DEVICES_RESOLVED }}
      run: |
        branch_name="perf/llm-perf-${{ github.run_id }}"
        cd $GITHUB_WORKSPACE && \
          git config user.name 'github-actions[bot]' && \
          git config user.email 'github-actions[bot]@users.noreply.github.com' && \
          git checkout -b $branch_name && \
          git ls-files -co --exclude-standard | grep 'perf.yaml' | xargs git add && \
          git commit -m "Add LLM performance numbers

        Models: $QAIHM_TEST_MODELS
        Devices: $QAIHM_TEST_DEVICES

        Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>" && \
          git push -u origin $branch_name
        echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

    - name: Upload consolidated perf.yaml files
      if: ${{ steps.check_changes.outputs.has_changes == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: updated-perf-yamls
        path: src/qai_hub_models/models/**/perf.yaml

    - name: Create Pull Request
      if: ${{ steps.push_changes.outputs.branch_name != '' && steps.check_changes.outputs.has_changes == 'true' }}
      uses: actions/github-script@v9
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ env.QAIHM_TEST_DEVICES_RESOLVED }}
      with:
        github-token: ${{ secrets.STAGING_GH_TOKEN }}
        result-encoding: string
        script: |
          const { repo, owner } = context.repo;
          const models = process.env.QAIHM_TEST_MODELS;
          const devices = process.env.QAIHM_TEST_DEVICES;
          const result = await github.rest.pulls.create({
            title: `[Automated] Add LLM performance numbers`,
            owner,
            repo,
            head: '${{ steps.push_changes.outputs.branch_name }}',
            base: 'main',
            body: [
              'Generated automatically by LLM Performance Collection workflow.',
              '',
              `Models: ${models}`,
              `Devices: ${devices}`,
              '',
              'Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            ].join('\n')
          });
          // Assign the PR to whoever triggered the run. Scheduled runs have
          // no human triggerer, so leave those unassigned.
          if (context.eventName !== 'schedule') {
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: result.data.number,
              assignees: ['${{ github.actor }}'],
            });
          }
          console.log('PR created:', result.data.html_url);
          return result.data.html_url;

  grade_responses:
    name: "Grade LLM Responses"
    needs: collect_llm_perf
    if: ${{ !cancelled() && inputs.run_eval }}
    permissions:
      contents: read
      id-token: write
      packages: read
      actions: read
    uses: ./.github/workflows/gpu_pod_lifecycle.yml
    with:
      is_grader: true
      runner-id: llm-perf-grader-${{ github.run_id }}-${{ github.run_attempt }}
      gpu-request: '1'
      cpu-request: '8'
      memory-request: '256Gi'
      deployment: ${{ inputs.deployment || 'prod' }}
      grader_artifacts_run_id: ${{ github.run_id }}
    secrets: inherit
