name: Release QAI Hub Models
run-name: Release QAI Hub Models (${{ inputs.target }})

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
      inputs:
          target:
              required: true
              type: choice
              default: staging
              description: Release Target
              options:
              - staging
              - prod

jobs:
  test_public_wheel:
    name: Unit Tests on Public Wheel
    secrets: inherit
    uses: ./.github/workflows/test.yml
    with:
      deployment: prod
      models: none # only enable unit tests
      use_public_wheel: true

  # This has an approval step built in; the release will be skipped if approval is not recieved.
  release_assets:
      name: Release Assets
      if: ${{ inputs.target == 'prod' }}
      secrets: inherit
      needs: [test_public_wheel]
      uses: ./.github/workflows/release_assets.yaml

  # Code release (public repo tag) must wait for assets so that the
  # published tag's fetch APIs work immediately on install.
  release_code:
      name: Release code to Repository
      secrets: inherit
      needs: [release_assets]
      uses: ./.github/workflows/release_code.yaml
      with:
          skip_approval: true

  # PyPI release must run after the asset release. The published wheel's
  # fetch APIs (e.g. fetch_huggingface_weights, fetch_qaihm_asset) expect
  # release assets to already be available on S3. Publishing the wheel
  # before assets are uploaded would give users a broken install.
  release_pypi:
      name: Release wheel to ${{ inputs.target == 'prod' && 'PyPi' || 'test PyPi' }}
      secrets: inherit
      needs: [test_public_wheel, release_assets]
      if: ${{ !cancelled() && needs.test_public_wheel.result == 'success' && (inputs.target != 'prod' || needs.release_assets.result == 'success') }}
      uses: ./.github/workflows/release_pypi.yaml
      with:
          target: ${{ inputs.target }}
          skip_approval: true

  # HF release verifies assets exist on S3 before pushing model cards
  release_huggingface:
      name: Release Hugging Face Model Cards
      secrets: inherit
      needs: [release_assets]
      uses: ./.github/workflows/release_huggingface.yaml
      with:
          skip_approval: true

  # Website release verifies assets exist on S3 during import
  sync_public_website:
    name: Sync Public Website & Create Public Website PR
    secrets: inherit
    needs: [release_assets]
    uses: ./.github/workflows/release_website.yml
    with:
      source_branch_name: ${{ github.ref }}
      dst_branch_name: ${{ format('dev/qaihm_bot-QCOM/qaihm_release/{0}', github.ref_name) }}
      create_pr: ${{ inputs.target == 'prod' }}
