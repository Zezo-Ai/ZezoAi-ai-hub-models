name: QAI Hub Models Weekly Prod Scorecard

on:
    workflow_dispatch: # Allows users to start this manually from the GitHub Actions UI.
    schedule:
        # 10 PM PST (11 PM PDT) on Fridays -- (Cron is in UTC, since GitHub Actions run in UTC)
        - cron: '0 6 * * SAT'
jobs:
    select-llm-models:
        name: Select Weekend LLM Models
        runs-on: [tetra-ubuntu-2204, self-hosted]
        outputs:
          # The base models plus this weekend's LLM group tokens.
          models: ${{ steps.pick.outputs.models }}
        env:
          VENV_PATH: build/ci-envs/qaihm-build
          BASE_MODELS: pytorch_no_llm,static
        steps:
          - uses: actions/checkout@v7

          - name: CI Setup
            uses: ./.github/actions/ci-setup
            with:
              sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
              venv-path: ${{ env.VENV_PATH }}

          - name: Select models
            id: pick
            run: |
              source "${{ env.VENV_PATH }}/bin/activate"
              # Alternate LLM groups by ISO-week parity: odd -> week1, even -> week2.
              if [ "$(( $(date -u +%V | sed 's/^0*//') % 2 ))" -eq 1 ]; then
                MODELS="${BASE_MODELS},llm_week1"
              else
                MODELS="${BASE_MODELS},llm_week2"
              fi
              # On a geniex_qairt QAIRT bump, also rebuild every downloadable LLM.
              if ! CHANGED="$(python -m qai_hub_models.scripts.qairt_geniex_changed)"; then
                echo "::error::qairt_geniex_changed failed"
                exit 1
              fi
              if [ "$CHANGED" = "true" ]; then
                MODELS="${MODELS},llm_downloadable"
              fi
              echo "models=${MODELS}" >> "$GITHUB_OUTPUT"

    run-scorecard:
        name: Run Prod ("Release") Scorecard
        needs: select-llm-models
        secrets: inherit
        uses: ./.github/workflows/scorecard.yml
        with:
          deployment: prod
          # Base models + this weekend's rotating LLM group token(s).
          models: ${{ needs.select-llm-models.outputs.models }}
          test_devices: all
          # geniex_qairt enables GenieX on-device LLM perf (and builds Genie assets);
          # it is a no-op for non-LLM models.
          test_runtimes: default, qnn_dlc_via_qnn_ep, geniex_qairt
          test_precisions: default
          qairt_version: qaihm_default
          delay: scorecard_collection_32h_delay
          test_scope: perf_and_accuracy
          release_scope: upload_export_assets_and_create_pr
          ignore_job_cache: false
          tableau_branch_name: weekly-prod
