name: Scorecard - Compute On-Device Accuracy Metrics

on:
    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:
      inputs:
        action_id:
          description: Scorecard Kickoff GitHub Action Run ID
          required: true
          type: string

    # Used by other workflows to trigger this workflow
    workflow_call:
      inputs:
        action_id:
          type: string
          required: true

        models:
          description: Models for which to compute accuracy. If unset, uses all models from the scorecard action.
          type: string
          required: false

        split_name:
          description: When split into sub-actions for parallel execution, this is the name of the split.
          required: false
          type: string
          default: ''

env:
  PYTHONUNBUFFERED: 1
  VENV_PATH: build/ci-envs/qaihm-build
  QAIHM_CI: 1
  CMAKE_ARGS: -DCMAKE_POLICY_VERSION_MINIMUM=3.5
  QAIHM_CI_USE_EDITABLE_INSTALL: 1

jobs:
  compute_on_device_accuracy:
    name: Compute On-Device Accuracy Metrics${{ inputs.split_name != '' && format(' ({0})', inputs.split_name) || '' }} (using jobs from ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{inputs.action_id}})
    runs-on: [tetra-ubuntu-2204, self-hosted]
    timeout-minutes: 1440 # 24 hours
    env:
      QAIHM_TEST_ARTIFACTS_DIR: ${{ inputs.action_id == '' && 'src/qai_hub_models/scorecard/intermediates' || format('build/scorecard-yamls/{0}', inputs.action_id) }}

    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download Post-Flaky-Job-Retry Artifacts
        id: download-post-flaky-job-retry-artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
            run-id: ${{ inputs.action_id }}
            github-token: ${{ github.token }}
            name: Scorecard Cached Artifact (Job-IDs, ${{ inputs.action_id }})
            path: ${{ env.QAIHM_TEST_ARTIFACTS_DIR }}

      - name: Download Flaky-Job Artifacts
        # If the "without Flaky Jobs" artifact doesn't exist (e.g., flaky jobs fix step failed),
        # download the original intermediates created by the main scorecard workflow.
        if: steps.download-post-flaky-job-retry-artifacts.outcome == 'failure'
        uses: actions/download-artifact@v8
        with:
            run-id: ${{ inputs.action_id }}
            github-token: ${{ github.token }}
            name: Scorecard Cached Artifact (Flaky-Job-IDs, ${{ inputs.action_id }})
            path: ${{ env.QAIHM_TEST_ARTIFACTS_DIR }}

      - name: Restore Scorecard Environment Variables
        id: restore_env_vars
        run: |
          # Restore environment variables from scorecard action
          cat "${{ env.QAIHM_TEST_ARTIFACTS_DIR }}/environment.env" >> "$GITHUB_ENV"

      - name: Set Models Environment Variable
        if: ${{ inputs.models }}
        run: echo "QAIHM_TEST_MODELS=${{ inputs.models }}" >> "$GITHUB_ENV"

      - name: CI Setup
        id: ci_setup
        uses: ./.github/actions/ci-setup
        with:
          sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
          venv-path: ${{ env.VENV_PATH }}
          aws-role-arn: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}
          hub-deployments: ${{ env.QAIHM_TEST_DEPLOYMENT }}
          hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
          hub-user-token-staging: ${{ secrets.HUB_USER_TOKEN_STAGING }}
          hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}
          hub-user-token-sandbox: ${{ secrets.HUB_USER_TOKEN_SANDBOX }}
          hub-private-user-token-prod: ${{ secrets.HUB_PRIVATE_USER_TOKEN_PROD }}
          hub-private-user-token-staging: ${{ secrets.HUB_PRIVATE_USER_TOKEN_STAGING }}
          hub-private-user-token-dev: ${{ secrets.HUB_PRIVATE_USER_TOKEN_DEV }}

      - name: Create Test Results Directory
        run: |
          mkdir -p ${{ github.workspace }}/test-results

      - name: Compute On-Device Accuracy Metrics (PyTorch Models)
        id: run-export-scripts
        continue-on-error: true
        env:
          QAIHM_JUNIT_XML_PATH: ${{ github.workspace }}/test-results/qaihm-device-accuracy-tests-junit.xml
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
            python3 scripts/build_and_test.py \
            --venv="${{ env.VENV_PATH }}" \
            --python="${{ steps.ci_setup.outputs.python-path }}" \
            compute_device_accuracy_metrics

      - name: Compute On-Device Accuracy Metrics (Static Models)
        id: evaluate-static-models-accuracy
        continue-on-error: true
        run: |
          source "${{env.VENV_PATH}}/bin/activate"
          python -m qai_hub_models.scorecard.static.scripts.evaluate_static_accuracy

      - name: Combine Per-Model JUnit XMLs
        if: ${{ always() }}
        run: |
          source "${{ env.VENV_PATH }}/bin/activate"
          mkdir -p ${{ github.workspace }}/combined-test-results
          python scripts/combine_junit_xml.py \
            --junit-xml ${{ github.workspace }}/test-results \
            --output ${{ github.workspace }}/combined-test-results/qaihm-device-accuracy-tests${{ inputs.split_name != '' && format('-{0}', inputs.split_name) || '' }}-junit.xml

      - name: Upload Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-accuracy${{ inputs.split_name != '' && format('-{0}', inputs.split_name) || '' }}
          path: ${{ github.workspace }}/combined-test-results
          if-no-files-found: ignore

      - name: Upload Accuracy CSV
        id: upload-accuracy-intermediates
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: Scorecard Cached Artifact (accuracy.csv, ${{ inputs.action_id }}${{ inputs.split_name != '' && format(', {0}', inputs.split_name) || '' }})
          path: ${{ env.QAIHM_TEST_ARTIFACTS_DIR }}/accuracy.csv
          if-no-files-found: ignore
