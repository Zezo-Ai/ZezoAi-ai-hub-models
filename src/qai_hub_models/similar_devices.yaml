# Maps unsupported devices to similar (supported) AI Hub devices.
# Performance results from a device with a matching chipset are duplicated
# for unsupported devices in perf.yaml to indicate model compatibility
# (not performance equivalence).
#
# Matching uses the chipset field, plus any chipset that normalizes to the
# same value via sanitize_chipset_name (e.g. 8-elite-for-galaxy -> 8-elite).
devices:
  SA8255P ADP:
    chipset: qualcomm-sa8775p
    os:
      ostype: Android
      version: '14'
    form_factor: Auto
    vendor: qualcomm
    icon: Car
    npu_count: 2
