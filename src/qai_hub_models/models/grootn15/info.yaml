name: GR00TN1.5
id: grootn15
status: published
headline: State-of-the-art vision-language-action model for dexterous robot manipulation, enabling zero-shot generalization across diverse embodiments via diffusion-based action generation.
domain: Multimodal
description: >
  GR00T N1.5 is a vision-language-action (VLA) model for generalist robot
  control. The model supports multiple robot embodiments
  and is designed for dexterous, long-horizon manipulation tasks.
use_case: Robotics
tags:
  - generative-ai
  - robotics
applicable_scenarios:
  - Robotics
related_models:
  - pi05
form_factors:
  - Auto
has_static_banner: true
has_animated_banner: false
dataset: [PickNPlace]
technical_details:
  Input: >
    RGB camera frames (one or more views), a natural language task instruction and
    robot proprioceptive state (joint positions/velocities).
  Output: >
    Action chunk representing predicted joint commands over the next N timesteps, generated via diffusion denoising.
license_type: apache-2.0
research_paper: https://arxiv.org/abs/2503.14734
research_paper_title: "GR00T N1: An Open Foundation Model for Generalist Humanoid Robots"
source_repo: https://github.com/NVIDIA/Isaac-GR00T/tree/n1.5-release
license: https://github.com/NVIDIA/Isaac-GR00T/blob/n1.5-release/LICENSE
