name: MobileFaceNet
id: mobile_facenet
status: pending
headline: Lightweight real-time face verification on-device.
domain: Computer Vision
description: MobileFaceNet is an efficient CNN that maps a 112x112 face image to a
  compact 128-dimensional embedding. Two embeddings are compared via cosine similarity
  to determine whether they belong to the same person, achieving 99.48% accuracy on
  the LFW benchmark. The model uses depthwise-separable convolutions and inverted
  residual blocks (MobileNetV2-style) to stay under 1M parameters, making it well-suited
  for real-time face verification on mobile and edge devices. Trained with ArcFace
  loss on MS-Celeb-1M.
use_case: Object Detection
tags:
- real-time
- bu-auto
applicable_scenarios:
- Incabinet driver monitoring
- phone unlocking
- building access control.
related_models:
