name: RangeNet++
id: rangenet_plus_plus
status: pending
headline: Real-time LiDAR point cloud semantic segmentation using range images.
domain: Computer Vision
description: RangeNet++ projects a LiDAR point cloud onto a 5-channel range image (depth, x, y, z, intensity) and applies a DarkNet-53 encoder with a decoder head to predict per-point semantic class labels in real time.
use_case: Driver Assistance
tags:
 - real-time
 - bu-auto
applicable_scenarios:
 - Autonomous Driving
 - Robotics
 - HD Mapping
related_models:
 - pidnet
 - ddrnet23_slim
form_factors:
 - Auto
 - IoT
has_static_banner: true
has_animated_banner: false
dataset:
 - semantickitti
technical_details:
 Model checkpoint: darknet53_rangenet++
 Input resolution: 64x2048
 Input channels: '5'
 Number of output classes: '20'
 Backbone: DarkNet-53
license_type: mit
