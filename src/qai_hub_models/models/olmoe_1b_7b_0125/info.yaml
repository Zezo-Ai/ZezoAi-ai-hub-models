headline: Efficient open Mixture-of-Experts language model for on-device text generation.
domain: Generative AI
use_case: Text Generation
description: OLMoE is a fully open Mixture-of-Experts language model from the Allen Institute for AI (AllenAI). The model activates 1B parameters per token out of 7B total parameters, making it efficient while maintaining strong performance. The model is quantized to Q4_0 for on-device deployment.
