domain: Generative AI
description: Llama-3-ELYZA-JP-8B is a lightweight LLM with only 8 billion parameters,
  yet achieves Japanese language performance comparable to GPT-3.5 Turbo. The model
  has undergone additional pre-training and post-training of Japanese to expand instruction-following
  capabilities in Japanese.
