name: MiniLM-v2
id: minilm_v2
status: published
headline: Lightweight sentence embedding model for semantic similarity and search.
domain: Multimodal
description: All-MiniLM-L6-v2 maps sentences to a 384-dimensional dense vector space.
  Trained on 1B+ sentence pairs, it excels at semantic search, clustering, and sentence
  similarity tasks while being small enough to run on mobile devices.
use_case: Text Generation
tags:
- foundation
- real-time
applicable_scenarios:
- Semantic Search
- Text Classification
- Clustering
related_models:
- bert_base_uncased_hf
- distil_bert_base_uncased_hf
form_factors:
- Phone
- Tablet
- IoT
has_static_banner: true
has_animated_banner: true
dataset:
- 1B+ training pairs from multiple sources
technical_details:
  Model checkpoint: sentence-transformers/all-MiniLM-L6-v2
  Input resolution: 128 tokens
  Number of parameters: 22.7M
  Model size (float): 86.7 MB
  Embedding dimension: 384
license_type: apache-2.0
research_paper: https://arxiv.org/abs/1908.10084
research_paper_title: 'Sentence-BERT: Sentence Embeddings using Siamese BERT-Networks'
source_repo: https://github.com/UKPLab/sentence-transformers
license: https://github.com/UKPLab/sentence-transformers/blob/master/LICENSE
supported_precisions:
