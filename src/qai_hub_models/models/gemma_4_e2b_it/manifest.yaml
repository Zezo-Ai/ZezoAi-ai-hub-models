name: Gemma-4-E2B-it
id: gemma_4_e2b_it
status: published
headline: Lightweight multimodal model from Google DeepMind handling text and image
  input.
domain: Generative AI
description: Gemma is a family of open models built by Google DeepMind. Gemma 4 models
  are multimodal, handling text and image input (with audio supported on small models)
  and generating text output. This release includes open-weights models in both pre-trained
  and instruction-tuned variants. Gemma 4 features a context window of up to 256K
  tokens and maintains multilingual support in over 140 languages.
use_case: Text Generation
