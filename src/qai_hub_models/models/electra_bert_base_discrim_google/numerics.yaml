metrics:
- dataset_name: electra_bert_wikitext_masked
  dataset_link: https://huggingface.co/datasets/wikitext
  dataset_split_description: wikitext-2-raw-v1 validation split
  metric_name: Top-1 Accuracy
  metric_description: Percentage of [MASK] positions correctly predicted as fake/replaced by the Electra discriminator.
  metric_unit: '%'
  metric_range:
    min: 0.0
    max: 100.0
  metric_enablement_threshold: 10.0
  num_partial_samples: 250
  partial_torch_metric: 88.0
  device_metric:
    Samsung Galaxy S25:
      float:
        tflite:
          partial_metric: 88.4
        qnn_dlc:
          partial_metric: 88.4
        onnx:
          partial_metric: 88.4
