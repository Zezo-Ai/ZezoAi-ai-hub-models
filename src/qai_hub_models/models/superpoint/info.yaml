name: SuperPoint
id: superpoint
status: pending
headline: Self-supervised keypoint detector and descriptor for real-time feature matching.
domain: Computer Vision
description: >
  SuperPoint is a self-supervised framework for detecting interest points and computing
  descriptors in a single forward pass. Trained using Homographic Adaptation on MS-COCO,
  it produces repeatable keypoints and 256-dimensional L2-normalised descriptors suitable
  for homography estimation, SLAM, and structure-from-motion pipelines.
use_case: Pose Estimation
tags:
  - real-time
applicable_scenarios:
  - Augmented Reality
  - Robotics
  - Structure from Motion
  - Visual SLAM
related_models:
  - depth_anything
  - mediapipe_hand
form_factors:
  - Phone
  - Tablet
  - IoT
  - XR
has_static_banner: false
has_animated_banner: false
dataset: []
numerics_benchmark:
  dataset_name: hpatches
  metric_name: Homography Estimation @3px
  value: 83.3
  unit: correctness@3px
  source: https://github.com/rpautrat/SuperPoint
technical_details:
  Model checkpoint: magic-leap-community/superpoint
  Input resolution: 480x640
  Number of parameters: 1.3M
  Model size (float): 5.0 MB
  Descriptor dimension: 256
  Backbone: VGG-style encoder (3× MaxPool, stride 8)
license_type: apache-2.0
research_paper: https://arxiv.org/abs/1712.07629
research_paper_title: 'SuperPoint: Self-Supervised Interest Point Detection and Description'
source_repo: https://huggingface.co/magic-leap-community/superpoint
license: https://huggingface.co/magic-leap-community/superpoint/blob/main/LICENSE
imsdk_supported: false
