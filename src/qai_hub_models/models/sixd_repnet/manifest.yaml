name: SixDRepNet
id: sixd_repnet
status: published
headline: Head pose estimation using 6D rotation representation and RepVGG backbone.
domain: Computer Vision
description: 6DRepNet predicts head pose (pitch, yaw, roll) from a face image using
  a RepVGG-B1g2 backbone and a continuous 6D rotation representation, achieving robust
  and accurate head pose estimation.
use_case: Pose Estimation
