name: GPT-OSS-20B
id: gpt_oss_20b
status: published
headline: State-of-the-art Mixture of Experts large language model with extended context
  length for text generation tasks.
domain: Generative AI
use_case: Text Generation
description: GPT-OSS-20B is a 20.9B parameter Mixture of Experts (MoE) language model
  with 32 experts (4 active per token). It features an extended 131K context length
  with YARN rope scaling and uses a GPT-4o compatible tokenizer. The model is quantized
  to MXFP4 for efficient on-device deployment.
tags:
- llm
- generative-ai
- moe
research_paper: https://arxiv.org/abs/2508.10925
research_paper_title: gpt-oss-120b & gpt-oss-20b Model Card
