name: EdgeTAM
id: edgetam
status: published
headline: Real-time on-device track-anything video segmentation and tracking.
domain: Computer Vision
description: EdgeTAM is a lightweight and efficient version of SAM 2, optimized for
  on-device tracking and segmenting any object in videos and low memory usage by using
  a novel 2D Spatial Perceiver and RepViT backbone.
use_case: Semantic Segmentation
tags:
- foundation
applicable_scenarios:
- Video Editing
- Camera
- Robotic Navigation
- Interactive Video Content
related_models:
- sam2
form_factors:
- Phone
- Tablet
has_static_banner: true
has_animated_banner: true
dataset:
- SA-V (Segment Anything Video dataset)
technical_details:
  Model checkpoint: edgetam.pt
  Input resolution (Encoder): 1024x1024
  Number of parameters (encoder): 8.3M
  Model size (encoder) (float): 33 MB
  Number of parameters (memory_encoder): 1.2M
  Model size (memory_encoder) (float): 4.6 MB
  Number of parameters (video_decoder): 6.22M
  Model size (video_decoder) (float): 23.7 MB
license_type: apache-2.0
research_paper: https://arxiv.org/abs/2501.07256
research_paper_title: 'EdgeTAM: On-Device Track Anything Model'
source_repo: https://github.com/facebookresearch/EdgeTAM
license: https://github.com/facebookresearch/EdgeTAM/blob/main/LICENSE
external_repos:
  edgetam:
    repo_url: https://github.com/facebookresearch/EdgeTAM.git
    commit_sha: a1209a454c9950d531498074a95ecf3a3ba02dfd
supported_precisions:
- float
- w8a8
has_on_target_demo: true
