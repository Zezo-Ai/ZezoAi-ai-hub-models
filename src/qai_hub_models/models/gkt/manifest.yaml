  Model checkpoint: map_segmentation_gkt_7x1_conv_setting2.ckpt
  Input resolution: 1 x 6 x 3 x 224 x 480
  Number of parameters: 1.18M
  Model size: 4.66 MB
applicable_scenarios:
- Object Detection
