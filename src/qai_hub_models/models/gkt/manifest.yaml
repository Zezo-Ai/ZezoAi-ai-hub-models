name: GKT
id: gkt
status: published
headline: Construct a bird’s eye view from sensors mounted on a vehicle.
domain: Computer Vision
use_case: Driver Assistance
tags: []
description: Geometry-guided Kernel Transformer is a machine learning model for generating
  a birds eye view represenation from the sensors(cameras) mounted on a vehicle.
research_paper: https://arxiv.org/abs/2206.04584
research_paper_title: Efficient and Robust 2D-to-BEV Representation Learning via Geometry-guided
  Kernel Transformer
source_repo: https://github.com/hustvl/GKT/
license: https://github.com/hustvl/GKT/blob/main/LICENSE
