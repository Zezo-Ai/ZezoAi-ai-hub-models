      scorecard_accuracy_failure: Torch and On-device accuracy diff (-11.800 mAP@0.5:0.95)
        above threshold (10.0 mAP@0.5:0.95)
  w8a8:
    onnx:
      scorecard_accuracy_failure: Torch and On-device accuracy diff (-42.800 mAP@0.5:0.95)
        above threshold (10.0 mAP@0.5:0.95)
    tflite:
      scorecard_accuracy_failure: Torch and On-device accuracy diff (-42.800 mAP@0.5:0.95)
        above threshold (10.0 mAP@0.5:0.95)
    qnn_dlc:
      scorecard_accuracy_failure: Torch and On-device accuracy diff (-42.800 mAP@0.5:0.95)
        above threshold (10.0 mAP@0.5:0.95)
outputs_to_skip_validation:
