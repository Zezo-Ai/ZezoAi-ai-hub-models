headline: Open-Vocabulary Object Detection with Vision Transformers.
domain: Computer Vision
description: OWL-ViT (Open-World Localization with Vision Transformers) is an open-vocabulary
  object detector that uses a CLIP-based ViT-B/32 backbone. Given an image and one
  or more free-form text queries, the model predicts bounding boxes and confidence
  scores for each query.
