name: SINet
id: sinet
status: published
headline: Lightweight portrait segmentation for background removal.
domain: Computer Vision
description: SINet is a machine learning model that is designed to segment people
  from close-up portrait images in real time.
use_case: Semantic Segmentation
tags: []
applicable_scenarios:
- Background replacement
- Face removal
related_models:
- fcn_resnet50
- unet_segmentation
- mediapipe_selfie
form_factors:
- Phone
- Tablet
- IoT
has_static_banner: true
has_animated_banner: true
dataset: []
technical_details:
  Model checkpoint: SINet.pth
  Input resolution: 224x224
  Number of output classes: 2 (foreground / background)
  Number of parameters: 91.9K
  Model size (float): 415 KB
  Model size (w8a8): 241 KB
license_type: mit
research_paper: https://arxiv.org/abs/1911.09099
research_paper_title: 'SINet: Extreme Lightweight Portrait Segmentation Networks with
  Spatial Squeeze Modules and Information Blocking Decoder'
source_repo: https://github.com/clovaai/ext_portrait_segmentation
license: https://github.com/clovaai/ext_portrait_segmentation/blob/master/LICENSE
imsdk_supported: true
numerics_benchmark:
  dataset_name: eg1800
  metric_name: Mean Intersection Over Union
